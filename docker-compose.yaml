version: "3.9"

services:
  adminer:  #Dung de quan ly database
    image: adminer:latest
    container_name: adminer  #Ten container
    restart: always
    ports:
      - "5050:8080"
    depends_on:
      - postgres
    networks:
      - spring-network
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    depends_on:
      - postgres
    volumes:
      - minio_data:/data
    networks:
      - spring-network
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spring-network

  app:
    build: .
    container_name: springboot_app
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      #Support more environment variables here.
      ACCESS_SECRET: access_secret
      REFRESH_SECRET: refresh_secret
      RESET_PASSWORD_SECRET: reset_password_secret
      VERIFY_EMAIL_SECRET: verify_email_secret
    networks:
      - spring-network

volumes:
  postgres_data:
  minio_data:
networks:
  spring-network: