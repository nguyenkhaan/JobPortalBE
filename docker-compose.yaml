services:
  postgres:
    image: postgres:16-alpine
    container_name: jobportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jobportal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:latest
    container_name: jobportal-adminer
    restart: unless-stopped
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jobportal-network

  minio:
    image: minio/minio:latest
    container_name: jobportal-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - jobportal-network

  minio-init:
    image: minio/mc:latest
    container_name: jobportal-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb local/jobportal --ignore-existing;
      exit 0;
      "
    networks:
      - jobportal-network

  api:
    image: jobportal-api:${API_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobportal-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - jobportal-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
  minio_data:

networks:
  jobportal-network:
    driver: bridge
