#spring.config.import=optional:file:.env[.properties]
spring.application.name=JobPortal
spring.jackson.default-property-inclusion=non_null
#https://www.baeldung.com/springboot-jpa-automatically-create-database-schema
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
#spring.datasource.url=jdbc:postgresql://ep-green-hall-a112s5b6-pooler.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require
#spring.datasource.username=neondb_owner
#spring.datasource.password=npg_0UrdS2pEaBlh
spring.datasource.driver-class-name=org.postgresql.Driver
#create if want to drop table, updtae if want to keep the able
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.database-platform=org.hibernate.dialect.Postg\reSQLDialect
#Spring prefix version 2 (for New version)
server.servlet.contextPath=/api
#Api documentation
#//Custom path, default is scalar
scalar.enabled=${APP_API_DOCS:true}
scalar.path=/docs

#Custom environment
app.environment=${APP_ENVIRONMENT:development}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.secret.reset.password=${APP_SECRET_RESET_PASSWORD:your-secret-key-1234567891011121314151636}
app.secret.verify.email=${APP_SECRET_VERIFY_EMAIL:your-secret-key-1234567891011121314151636}
app.secret.access=${APP_SECRET_ACCESS:your-secret-key-1234567891011121314151636}
app.secret.refresh=${APP_SECRET_REFRESH:your-secret-key-1234567891011121314151636}
server.port=${SERVER_PORT:8080}
minio.url=${MINIO_URL:http://localhost:9000}
minio.access.name=${MINIO_ACCESS_NAME:minioadmin}
minio.access.secret=${MINIO_ACCESS_SECRET:minioadmin}
minio.bucket.name=${MINIO_BUCKET_NAME:jobportal}
#Email
app.mail.from=${MAIL_FROM:jobportal@example.com}
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}

#Payos payment gateway configuration
app.payos.client-id=${PAYOS_CLIENT_ID:thay_ma_client_id_vao_day}
app.payos.api-key=${PAYOS_API_KEY:thay_ma_api_key_vao_day}
app.payos.checksum-key=${PAYOS_CHECKSUM_KEY:thay_ma_checksum_key_vao_day}