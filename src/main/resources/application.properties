spring.application.name=JobPortal
#https://www.baeldung.com/springboot-jpa-automatically-create-database-schema
spring.datasource.url=jdbc:postgresql://localhost:5432/mydb
spring.datasource.username=admin
spring.datasource.password=admin
#spring.datasource.url=jdbc:postgresql://ep-green-hall-a112s5b6-pooler.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require
#spring.datasource.username=neondb_owner
#spring.datasource.password=Paste the password here
spring.datasource.driver-class-name=org.postgresql.Driver
#create if want to drop table
spring.jpa.hibernate.ddl-auto=update  
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#Spring prefix version 1 (for Old version)
server.contextPath=/api
#Spring prefix version 2 (for New version)
server.servlet.contextPath=/api
#Api documentation
#//Custom path, default is scalar
scalar.enabled=true
scalar.path=/docs